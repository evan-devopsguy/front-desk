# Production compose for the single-tenant Mac Mini deployment (Cooper Family
# Garage Doors). Distinct from docker-compose.yml (which only spins up a dev
# Postgres). Run with:
#   docker compose -f docker-compose.prod.yml up -d
#
# Public ingress is via Tailscale Funnel running on the host (NOT in a
# container), pointed at 127.0.0.1:3001. See docs/MAC_MINI_DEPLOY.md.
#
# All multi-tenant prod traffic should go to the cloud deploy (fly.io) — this
# file is intentionally single-purpose.

name: medspa-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medspa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medspa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: medspa
    # Bind to loopback only — the runner needs psql access for ad-hoc work
    # but we never expose postgres to the LAN, let alone the internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - medspa-pg-data:/var/lib/postgresql/data
      # First-init only. Schema is also re-applied via the migrate runner
      # (apps/api/dist/db/migrate.js) which is idempotent and tracks applied
      # migrations in schema_migrations.
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medspa -d medspa"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medspa-prod

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: medspa-api:local
    container_name: medspa-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://medspa:${POSTGRES_PASSWORD}@postgres:5432/medspa
      DATABASE_APP_ROLE: medspa_app
    # Bind to loopback only — Tailscale Funnel runs on the host and forwards
    # public traffic here. We never expose 3001 to the LAN.
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3001/healthz',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - medspa-prod

networks:
  medspa-prod:
    driver: bridge

volumes:
  medspa-pg-data:
